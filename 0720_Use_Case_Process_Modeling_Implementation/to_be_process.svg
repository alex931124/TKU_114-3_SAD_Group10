  <rect x="435" y="80" width="230" height="520" rx="12" fill="#fef3c7" stroke="#d97706"/>
  <text x="550" y="115" text-anchor="middle" font-size="20" font-family="Microsoft JhengHei, Arial">系統</text>
  <rect x="790" y="80" width="230" height="520" rx="12" fill="#dcfce7" stroke="#15803d"/>
  <text x="905" y="115" text-anchor="middle" font-size="20" font-family="Microsoft JhengHei, Arial">宿舍管理員 / 維修人員</text>

  <ellipse cx="195" cy="180" rx="80" ry="38" fill="#ffffff" stroke="#1d4ed8"/><text x="195" y="187" text-anchor="middle" font-size="16">填寫報修資料</text>
