  <rect x="480" y="285" width="140" height="68" rx="10" fill="#ffffff" stroke="#d97706"/><text x="550" y="323" text-anchor="middle" font-size="15">建立案件與狀態</text>
  <rect x="480" y="400" width="140" height="68" rx="10" fill="#ffffff" stroke="#d97706"/><text x="550" y="438" text-anchor="middle" font-size="15">派工與更新狀態</text>
  <rect x="845" y="400" width="120" height="68" rx="10" fill="#ffffff" stroke="#15803d"/><text x="905" y="438" text-anchor="middle" font-size="15">完成回報</text>
  <path d="M275 180 L480 180" stroke="#1f2937" stroke-width="2" fill="none"/>
  <path d="M550 238 L550 285" stroke="#1f2937" stroke-width="2" fill="none"/>
  <path d="M550 353 L550 400" stroke="#1f2937" stroke-width="2" fill="none"/>
  <path d="M620 434 L845 434" stroke="#1f2937" stroke-width="2" fill="none"/>
  <text x="325" y="165" font-size="14">提交</text>
  <text x="560" y="265" font-size="14">成功／錯誤</text>
  <text x="560" y="385" font-size="14">狀態轉換</text>
  <text x="722" y="420" font-size="14">交接</text>

  <text x="110" y="620" font-size="16" font-family="Microsoft JhengHei, Arial">改善重點：統一入口、集中清單、明確狀態、可追溯操作</text>
